<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#E8F2F8">
<title>Melodia — Уроки Музики</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EBF3F9;
  --bg-warm: #F5F0EC;
  --card: #FFFFFF;
  --card-hover: #F7FBFD;
  --primary: #7CB8D4;
  --primary-dark: #5A9BBF;
  --primary-light: #C5E0ED;
  --primary-pale: #E8F2F8;
  --accent-rose: #E8B4B4;
  --accent-rose-light: #FBF0F0;
  --accent-green: #9BCFAC;
  --accent-green-light: #EDF7F0;
  --accent-lavender: #B8A9D4;
  --accent-lavender-light: #F0ECF7;
  --text: #2D3748;
  --text-secondary: #64748B;
  --text-light: #94A3B8;
  --border: #E2E8F0;
  --shadow: 0 2px 12px rgba(124, 184, 212, 0.12);
  --shadow-lg: 0 8px 32px rgba(124, 184, 212, 0.18);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --nav-height: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 4px; }

/* ═══ LOGIN SCREEN ═══ */
#loginScreen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: linear-gradient(160deg, #E8F2F8 0%, #F5F0EC 40%, #FBF0F0 70%, #E8F2F8 100%);
  position: relative;
  overflow: hidden;
}

#loginScreen::before {
  content: '♪ ♫ ♪';
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2rem;
  color: var(--primary-light);
  letter-spacing: 1.5rem;
  opacity: 0.5;
  animation: floatNotes 6s ease-in-out infinite;
}

@keyframes floatNotes {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.4; }
  50% { transform: translateX(-50%) translateY(-12px); opacity: 0.7; }
}

.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 3.2rem;
  font-weight: 600;
  color: var(--primary-dark);
  margin-bottom: 0.25rem;
  letter-spacing: -0.5px;
}

.login-sub {
  font-size: 0.95rem;
  color: var(--text-secondary);
  margin-bottom: 2.5rem;
  font-style: italic;
}

.login-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 32px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: var(--shadow);
}

.login-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.login-btn:active { transform: scale(0.97); }

.login-btn svg { width: 20px; height: 20px; }

.login-note {
  position: absolute;
  bottom: 2rem;
  font-size: 0.8rem;
  color: var(--text-light);
  text-align: center;
  line-height: 1.5;
}

/* ═══ MAIN APP ═══ */
#mainApp { display: none; padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 8px); }

/* ═══ HEADER ═══ */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 8px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}

.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--primary-dark);
}

.header-user {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-user img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--primary-light);
}

/* ═══ NAVIGATION ═══ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(var(--nav-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(226, 232, 240, 0.6);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 16px;
  border: none;
  background: none;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

.nav-item .nav-icon { font-size: 1.4rem; transition: transform 0.25s; }
.nav-item .nav-label { font-size: 0.65rem; color: var(--text-light); font-weight: 500; transition: color 0.25s; }
.nav-item.active .nav-icon { transform: scale(1.15); }
.nav-item.active .nav-label { color: var(--primary-dark); font-weight: 600; }
.nav-item.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--primary);
  border-radius: 0 0 3px 3px;
}

.nav-badge {
  position: absolute;
  top: 2px;
  right: 8px;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  background: var(--accent-rose);
  color: white;
  font-size: 0.6rem;
  font-weight: 700;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ═══ VIEWS ═══ */
.view { display: none; padding: 0 16px 16px; animation: fadeIn 0.3s ease; }
.view.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ═══ SECTIONS ═══ */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .st-icon { font-size: 1rem; }

/* ═══ CARDS ═══ */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  border: 1px solid rgba(226, 232, 240, 0.5);
}

.card:active { transform: scale(0.985); }

/* ═══ LESSON CARD ═══ */
.lesson-card {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
}

.lesson-emoji {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
}

.lesson-emoji.status-planned { background: var(--primary-pale); }
.lesson-emoji.status-completed { background: var(--accent-lavender-light); }
.lesson-emoji.status-paid { background: var(--accent-green-light); }

.lesson-info { flex: 1; min-width: 0; }

.lesson-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.lesson-meta {
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lesson-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}

.lesson-price {
  font-weight: 600;
  font-size: 1rem;
  color: var(--text);
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}

.status-badge:active { transform: scale(0.93); }

.badge-planned { background: var(--primary-pale); color: var(--primary-dark); }
.badge-completed { background: var(--accent-lavender-light); color: #7C6BA0; }
.badge-paid { background: var(--accent-green-light); color: #5A9B6E; }

/* ═══ STUDENT CARD ═══ */
.student-card {
  display: flex;
  align-items: center;
  gap: 14px;
}

.student-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--primary-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}

.student-info { flex: 1; min-width: 0; }

.student-name {
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 2px;
}

.student-details {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.messenger-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}

.messenger-btn:active { transform: scale(0.9); }
.messenger-btn.whatsapp { background: #DCF8C6; }
.messenger-btn.telegram { background: #D6EFFF; }
.messenger-btn.facebook { background: #E3E8FF; }
.messenger-btn.imessage { background: #D4F5DC; }

/* ═══ WEEK STRIP ═══ */
.week-strip {
  display: flex;
  gap: 4px;
  padding: 12px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.week-strip::-webkit-scrollbar { display: none; }

.day-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 12px;
  border-radius: 14px;
  min-width: 52px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: var(--card);
  font-family: 'DM Sans', sans-serif;
  border: 1.5px solid transparent;
}

.day-chip .day-name { font-size: 0.65rem; color: var(--text-light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.day-chip .day-num { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-top: 2px; }
.day-chip .day-dots { display: flex; gap: 3px; margin-top: 4px; min-height: 6px; }
.day-chip .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); }
.day-chip.today { border-color: var(--primary); }
.day-chip.selected { background: var(--primary); }
.day-chip.selected .day-name, .day-chip.selected .day-num { color: white; }
.day-chip.selected .day-dot { background: white; }

/* ═══ FAB ═══ */
.fab {
  position: fixed;
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  font-size: 1.8rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(90, 155, 191, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 90;
  transition: all 0.25s;
}

.fab:active { transform: scale(0.9); }
.fab:hover { box-shadow: 0 6px 24px rgba(90, 155, 191, 0.5); }

/* ═══ MODAL / BOTTOM SHEET ═══ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45, 55, 72, 0.35);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeOverlay 0.25s ease;
}

@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

.modal-sheet {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 90dvh;
  overflow-y: auto;
  padding: 8px 20px 32px;
  animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 8px auto 16px;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 20px;
}

/* ═══ FORM ═══ */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  color: var(--text);
  background: var(--bg);
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.form-input:focus { outline: none; border-color: var(--primary); background: white; }
.form-input::placeholder { color: var(--text-light); }

.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

.form-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.form-btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(90, 155, 191, 0.3);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text-secondary);
  margin-top: 8px;
}

.btn-danger {
  background: var(--accent-rose-light);
  color: #C45A5A;
  margin-top: 8px;
}

/* ═══ EMOJI PICKER ═══ */
.emoji-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.emoji-option {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 2px solid transparent;
  background: var(--bg);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.emoji-option:active { transform: scale(0.9); }
.emoji-option.selected { border-color: var(--primary); background: var(--primary-pale); }

/* ═══ MESSENGER PICKER ═══ */
.messenger-grid {
  display: flex;
  gap: 8px;
}

.messenger-option {
  flex: 1;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.messenger-option .m-icon { font-size: 1.5rem; }
.messenger-option .m-label { font-size: 0.6rem; font-weight: 600; color: var(--text-secondary); }
.messenger-option.selected { border-color: var(--primary); background: var(--primary-pale); }

/* ═══ PAYMENT METHOD PICKER ═══ */
.payment-grid {
  display: flex;
  gap: 8px;
}

.payment-option {
  flex: 1;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.payment-option .p-icon { font-size: 1.5rem; }
.payment-option .p-label { font-size: 0.6rem; font-weight: 600; color: var(--text-secondary); }
.payment-option.selected { border-color: var(--primary); background: var(--primary-pale); }

/* ═══ SUGGESTED STUDENTS ═══ */
.suggested-list {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 4px 0 8px;
  scrollbar-width: none;
}
.suggested-list::-webkit-scrollbar { display: none; }

.suggested-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  min-width: 72px;
  font-family: 'DM Sans', sans-serif;
}

.suggested-chip:active { transform: scale(0.93); }
.suggested-chip .sc-emoji { font-size: 1.6rem; }
.suggested-chip .sc-name { font-size: 0.7rem; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }

/* ═══ UNPAID SUMMARY ═══ */
.unpaid-banner {
  background: linear-gradient(135deg, var(--accent-rose-light) 0%, #FFF5F5 100%);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid rgba(232, 180, 180, 0.3);
}

.unpaid-banner:active { transform: scale(0.98); }
.unpaid-banner .ub-icon { font-size: 1.5rem; }
.unpaid-banner .ub-text { flex: 1; }
.unpaid-banner .ub-count { font-weight: 700; font-size: 0.95rem; color: #B85C5C; }
.unpaid-banner .ub-label { font-size: 0.75rem; color: var(--text-secondary); }
.unpaid-banner .ub-sum { font-weight: 700; font-size: 1.1rem; color: #B85C5C; }

/* ═══ EMPTY STATE ═══ */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-light);
}
.empty-state .es-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.empty-state .es-text { font-size: 0.9rem; line-height: 1.5; }

/* ═══ SETTINGS ═══ */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.setting-row:last-child { border-bottom: none; }

.setting-label { font-weight: 500; font-size: 0.95rem; }
.setting-value {
  display: flex;
  align-items: center;
  gap: 8px;
}

.setting-select {
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-xs);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  background: var(--bg);
  color: var(--text);
  -webkit-appearance: none;
}

.logout-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  margin-top: 32px;
  border: 1.5px solid var(--accent-rose);
  border-radius: var(--radius-sm);
  background: transparent;
  color: #B85C5C;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.logout-btn:active { background: var(--accent-rose-light); }

/* ═══ TODAY HEADER ═══ */
.today-header {
  padding: 8px 4px 4px;
}

.today-date {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
}

.today-sub {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* ═══ WEEK NAV ═══ */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
}

.week-nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--card);
  color: var(--text-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.week-nav-btn:active { background: var(--primary-pale); }

.week-nav-label {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text);
}

/* ═══ STUDENT SELECT LIST ═══ */
.student-select-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;

<script>
// ═══════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyATvn_FjFyLlp2hPg7nym6zRsZAHxi481E",
  authDomain: "melodia-6b440.firebaseapp.com",
  projectId: "melodia-6b440",
  storageBucket: "melodia-6b440.firebasestorage.app",
  messagingSenderId: "417592321178",
  appId: "1:417592321178:web:06cd4cf1730e7efacaab23"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const gProvider = new firebase.auth.GoogleAuthProvider();
gProvider.addScope('https://www.googleapis.com/auth/calendar.events');

let currentUser = null;
let gAccessToken = null;
let students = [];
let lessons = [];
let settings = { reminderMinutes: 30 };
let currentView = 'dashboard';
let selectedDate = todayStr();
let selectedWeekStart = getWeekStart(new Date());

// ═══════════════════════════════════════
// DATE UTILS
// ═══════════════════════════════════════
function todayStr() { return fmtDate(new Date()); }

function fmtDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function getWeekStart(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return fmtDate(dt);
}

function addDays(dateStr, n) {
  const d = parseDate(dateStr);
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}

const DAY_NAMES = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTH_NAMES = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];

function fmtDateUkr(dateStr) {
  const d = parseDate(dateStr);
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

function fmtDateFull(dateStr) {
  const d = parseDate(dateStr);
  const dayName = ['Неділя','Понеділок','Вівторок','Середа','Четвер','П\'ятниця','Субота'][d.getDay()];
  return `${dayName}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

function fmtWeekRange(startStr) {
  const end = addDays(startStr, 6);
  const s = parseDate(startStr), e = parseDate(end);
  if (s.getMonth() === e.getMonth()) {
    return `${s.getDate()} – ${e.getDate()} ${MONTH_NAMES[s.getMonth()]}`;
  }
  return `${s.getDate()} ${MONTH_NAMES[s.getMonth()].slice(0,3)} – ${e.getDate()} ${MONTH_NAMES[e.getMonth()].slice(0,3)}`;
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function googleLogin() {
  auth.signInWithPopup(gProvider).then(result => {
    if (result.credential) {
      gAccessToken = result.credential.accessToken;
    }
  }).catch(err => {
    console.error("Login error:", err);
    alert("Помилка входу: " + err.message);
  });
}

auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userPhoto').src = user.photoURL || '';
    loadData();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
  }
});

// ═══════════════════════════════════════
// FIRESTORE
// ═══════════════════════════════════════
function userRef() { return db.collection('users').doc(currentUser.uid); }

async function loadData() {
  try {
    // Load students
    const sSnap = await userRef().collection('students').orderBy('name').get();
    students = sSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Load lessons (last 60 days + future)
    const since = addDays(todayStr(), -60);
    const lSnap = await userRef().collection('lessons').where('date', '>=', since).orderBy('date').get();
    lessons = lSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Load settings
    const setDoc = await userRef().collection('settings').doc('app').get();
    if (setDoc.exists) settings = { ...settings, ...setDoc.data() };

    renderAll();
  } catch(e) {
    console.error('Load error:', e);
  }
}

async function saveStudent(data, id) {
  if (id) {
    await userRef().collection('students').doc(id).update(data);
    const idx = students.findIndex(s => s.id === id);
    if (idx >= 0) students[idx] = { ...students[idx], ...data };
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    const ref = await userRef().collection('students').add(data);
    students.push({ id: ref.id, ...data });
  }
  students.sort((a,b) => a.name.localeCompare(b.name));
  renderAll();
}

async function deleteStudent(id) {
  await userRef().collection('students').doc(id).delete();
  students = students.filter(s => s.id !== id);
  renderAll();
}

async function saveLesson(data, id) {
  if (id) {
    await userRef().collection('lessons').doc(id).update(data);
    const idx = lessons.findIndex(l => l.id === id);
    if (idx >= 0) lessons[idx] = { ...lessons[idx], ...data };
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    const ref = await userRef().collection('lessons').add(data);
    const newLesson = { id: ref.id, ...data };
    lessons.push(newLesson);
    // Create Google Calendar event
    createCalendarEvent(newLesson);
  }
  lessons.sort((a,b) => a.date === b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date));
  renderAll();
}

async function deleteLesson(id) {
  const lesson = lessons.find(l => l.id === id);
  if (lesson && lesson.calendarEventId) {
    deleteCalendarEvent(lesson.calendarEventId);
  }
  await userRef().collection('lessons').doc(id).delete();
  lessons = lessons.filter(l => l.id !== id);
  renderAll();
}

async function updateLessonStatus(id, newStatus) {
  await userRef().collection('lessons').doc(id).update({ status: newStatus });
  const idx = lessons.findIndex(l => l.id === id);
  if (idx >= 0) lessons[idx].status = newStatus;
  renderAll();
}

async function saveSettings(data) {
  settings = { ...settings, ...data };
  await userRef().collection('settings').doc('app').set(settings, { merge: true });
}

// ═══════════════════════════════════════
// GOOGLE CALENDAR
// ═══════════════════════════════════════
async function createCalendarEvent(lesson) {
  if (!gAccessToken) return;
  try {
    const student = students.find(s => s.id === lesson.studentId);
    const startDT = `${lesson.date}T${lesson.time}:00`;
    const endDate = new Date(startDT);
    endDate.setMinutes(endDate.getMinutes() + (lesson.duration || 45));
    const endDT = endDate.toISOString().slice(0,19);

    const paymentIcons = { cash: '💵', card: '💳', paypal: '🅿️' };
    const paymentIcon = paymentIcons[lesson.paymentMethod] || '💵';
    const paymentNames = { cash: 'Готівка', card: 'Картка', paypal: 'PayPal' };
    const paymentName = paymentNames[lesson.paymentMethod] || 'Готівка';

    const event = {
      summary: `🎵 Урок: ${lesson.studentName}`,
      description: `Учень: ${lesson.studentName}\nТривалість: ${lesson.duration || 45} хв\nЦіна: ${lesson.price || 0}€\nСпосіб оплати: ${paymentIcon} ${paymentName}`,
      start: { dateTime: startDT, timeZone: 'Europe/Berlin' },
      end: { dateTime: endDT, timeZone: 'Europe/Berlin' },
      reminders: {
        useDefault: false,
        overrides: [{ method: 'popup', minutes: settings.reminderMinutes || 30 }]
      }
    };

    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(event)
    });

    if (res.ok) {
      const data = await res.json();
      await userRef().collection('lessons').doc(lesson.id).update({ calendarEventId: data.id });
      const idx = lessons.findIndex(l => l.id === lesson.id);
      if (idx >= 0) lessons[idx].calendarEventId = data.id;
    } else if (res.status === 401) {
      gAccessToken = null;
    }
  } catch(e) { console.error('Calendar error:', e); }
}

async function updateCalendarEvent(lesson) {
  if (!gAccessToken || !lesson.calendarEventId) return;
  try {
    const startDT = `${lesson.date}T${lesson.time}:00`;
    const endDate = new Date(startDT);
    endDate.setMinutes(endDate.getMinutes() + (lesson.duration || 45));
    const endDT = endDate.toISOString().slice(0,19);

    const paymentIcons = { cash: '💵', card: '💳', paypal: '🅿️' };
    const paymentIcon = paymentIcons[lesson.paymentMethod] || '💵';
    const paymentNames = { cash: 'Готівка', card: 'Картка', paypal: 'PayPal' };
    const paymentName = paymentNames[lesson.paymentMethod] || 'Готівка';

    const event = {
      summary: `🎵 Урок: ${lesson.studentName}`,
      description: `Учень: ${lesson.studentName}\nТривалість: ${lesson.duration || 45} хв\nЦіна: ${lesson.price || 0}€\nСпосіб оплати: ${paymentIcon} ${paymentName}`,
      start: { dateTime: startDT, timeZone: 'Europe/Berlin' },
      end: { dateTime: endDT, timeZone: 'Europe/Berlin' },
      reminders: {
        useDefault: false,
        overrides: [{ method: 'popup', minutes: settings.reminderMinutes || 30 }]
      }
    };

    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${lesson.calendarEventId}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(event)
    });
    if (res.status === 401) gAccessToken = null;
  } catch(e) { console.error('Calendar update error:', e); }
}

async function deleteCalendarEvent(eventId) {
  if (!gAccessToken || !eventId) return;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${gAccessToken}` }
    });
    if (res.status === 401) gAccessToken = null;
  } catch(e) { console.error('Calendar delete error:', e); }
}

// ═══════════════════════════════════════
// MESSENGER LINKS
// ═══════════════════════════════════════
function getMessengerLink(type, contact) {
  if (!contact) return '#';
  const clean = contact.replace(/\s+/g, '');
  switch(type) {
    case 'whatsapp': return `https://wa.me/${clean.replace('+','')}`;
    case 'telegram': return clean.startsWith('@') ? `https://t.me/${clean.slice(1)}` : `https://t.me/${clean}`;
    case 'facebook': return `https://m.me/${clean}`;
    case 'imessage': return `sms:${clean}`;
    default: return '#';
  }
}

function getMessengerIcon(type) {
  switch(type) {
    case 'whatsapp': return '💬';
    case 'telegram': return '✈️';
    case 'facebook': return '💭';
    case 'imessage': return '🍏';
    default: return '💬';
  }
}

function getMessengerClass(type) {
  return type || 'whatsapp';
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view${view.charAt(0).toUpperCase()+view.slice(1)}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === view);
  });
  // Show/hide FAB
  const fab = document.getElementById('fabBtn');
  fab.style.display = (view === 'settings') ? 'none' : 'flex';

  if (view === 'lessons') fab.onclick = () => openAddLesson();
  else if (view === 'students') fab.onclick = () => openStudentForm();
  else fab.onclick = () => openAddLesson();

  renderAll();
}

// ═══════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════
function renderAll() {
  renderDashboard();
  renderLessons();
  renderStudents();
  renderSettings();
  updateUnpaidBadge();
}

function updateUnpaidBadge() {
  const unpaid = lessons.filter(l => l.status === 'completed');
  const badge = document.querySelector('.nav-item[data-view="dashboard"] .nav-badge');
  if (badge) badge.remove();
  if (unpaid.length > 0) {
    const el = document.querySelector('.nav-item[data-view="dashboard"]');
    el.insertAdjacentHTML('beforeend', `<span class="nav-badge">${unpaid.length}</span>`);
  }
}

// ═══ DASHBOARD ═══
function renderDashboard() {
  const today = todayStr();
  const todayLessons = lessons.filter(l => l.date === today).sort((a,b) => (a.time||'').localeCompare(b.time||''));
  const upcoming = lessons.filter(l => l.date > today && l.status === 'planned').sort((a,b) => a.date === b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date)).slice(0, 8);
  const unpaid = lessons.filter(l => l.status === 'completed').sort((a,b) => a.date.localeCompare(b.date));
  const unpaidSum = unpaid.reduce((s,l) => s + (l.price||0), 0);

  let html = '';

  // Today header
  html += `<div class="today-header">
    <div class="today-date">${fmtDateFull(today)}</div>
    <div class="today-sub">${todayLessons.length > 0 ? `${todayLessons.length} урок${todayLessons.length > 1 ? (todayLessons.length < 5 ? 'и' : 'ів') : ''} сьогодні` : 'Сьогодні немає уроків'}</div>
  </div>`;

  // Unpaid banner
  if (unpaid.length > 0) {
    html += `<div class="unpaid-banner" onclick="showUnpaid()">
      <div class="ub-icon">💰</div>
      <div class="ub-text">
        <div class="ub-count">${unpaid.length} несплачен${unpaid.length === 1 ? 'ий' : (unpaid.length < 5 ? 'і' : 'их')} урок${unpaid.length === 1 ? '' : (unpaid.length < 5 ? 'и' : 'ів')}</div>
        <div class="ub-label">натисніть щоб переглянути</div>
      </div>
      <div class="ub-sum">${unpaidSum}€</div>
    </div>`;
  }

  // Today's lessons
  if (todayLessons.length > 0) {
    html += `<div class="section-title"><span class="st-icon">🎵</span> Сьогодні</div>`;
    todayLessons.forEach(l => { html += renderLessonCard(l); });
  }

  // Upcoming
  if (upcoming.length > 0) {
    html += `<div class="section-title"><span class="st-icon">📅</span> Найближчі уроки</div>`;
    upcoming.forEach(l => {
      html += renderLessonCard(l, true);
    });
  }

  // Empty state
  if (todayLessons.length === 0 && upcoming.length === 0 && students.length === 0) {
    html += `<div class="empty-state">
      <div class="es-icon">🎶</div>
      <div class="es-text">Ласкаво просимо до Melodia!<br>Додайте першого учня, щоб розпочати</div>
    </div>`;
  }

  document.getElementById('viewDashboard').innerHTML = html;
}

// ═══ LESSONS VIEW ═══
function renderLessons() {
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const ds = addDays(selectedWeekStart, i);
    const d = parseDate(ds);
    const dayLessons = lessons.filter(l => l.date === ds);
    weekDays.push({ date: ds, dayNum: d.getDate(), dayName: DAY_NAMES[d.getDay()], lessons: dayLessons, isToday: ds === todayStr() });
  }

  const dayLessons = lessons.filter(l => l.date === selectedDate).sort((a,b) => (a.time||'').localeCompare(b.time||''));

  let html = '';

  // Week nav
  html += `<div class="week-nav">
    <button class="week-nav-btn" onclick="prevWeek()">‹</button>
    <span class="week-nav-label">${fmtWeekRange(selectedWeekStart)}</span>
    <button class="week-nav-btn" onclick="nextWeek()">›</button>
  </div>`;

  // Week strip
  html += '<div class="week-strip">';
  weekDays.forEach(d => {
    const sel = d.date === selectedDate ? 'selected' : '';
    const today = d.isToday ? 'today' : '';
    html += `<button class="day-chip ${sel} ${today}" onclick="selectDay('${d.date}')">
      <span class="day-name">${d.dayName}</span>
      <span class="day-num">${d.dayNum}</span>
      <div class="day-dots">${d.lessons.map(() => '<span class="day-dot"></span>').join('')}</div>
    </button>`;
  });
  html += '</div>';

  // Day header
  html += `<div class="section-title">${fmtDateFull(selectedDate)}</div>`;

  if (dayLessons.length > 0) {
    dayLessons.forEach(l => { html += renderLessonCard(l); });
  } else {
    html += `<div class="empty-state">
      <div class="es-icon">✨</div>
      <div class="es-text">Немає уроків на цей день</div>
    </div>`;
  }

  document.getElementById('viewLessons').innerHTML = html;
}

function prevWeek() {
  selectedWeekStart = addDays(selectedWeekStart, -7);
  selectedDate = selectedWeekStart;
  renderLessons();
}

function nextWeek() {
  selectedWeekStart = addDays(selectedWeekStart, 7);
  selectedDate = selectedWeekStart;
  renderLessons();
}

function selectDay(d) {
  selectedDate = d;
  renderLessons();
}

// ═══ LESSON CARD ═══
function renderLessonCard(l, showDate) {
  const statusLabels = { planned: 'Заплановано', completed: 'Відбувся', paid: 'Сплачено' };
  const statusClass = `badge-${l.status}`;
  const emojiClass = `status-${l.status}`;
  const student = students.find(s => s.id === l.studentId);
  const emoji = student?.emoji || l.studentEmoji || '🎵';
  const nextStatus = l.status === 'planned' ? 'completed' : (l.status === 'completed' ? 'paid' : 'planned');
  const dateLabel = showDate ? `<span>${fmtDateUkr(l.date)}</span>` : '';

  const paymentIcons = { cash: '💵', card: '💳', paypal: '🅿️' };
  const paymentIcon = paymentIcons[l.paymentMethod] || '💵';

  return `<div class="card lesson-card" onclick="openEditLesson('${l.id}')">
    <div class="lesson-emoji ${emojiClass}">${emoji}</div>
    <div class="lesson-info">
      <div class="lesson-name">${l.studentName || 'Учень'}</div>
      <div class="lesson-meta">
        <span>${l.time || ''}</span>
        <span>${l.duration || 45} хв</span>
        <span>${paymentIcon}</span>
        ${dateLabel}
      </div>
    </div>
    <div class="lesson-right">
      <div class="lesson-price">${l.price || 0}€</div>
      <button class="status-badge ${statusClass}" onclick="event.stopPropagation(); cycleStatus('${l.id}', '${nextStatus}')">
        ${statusLabels[l.status] || l.status}
      </button>
    </div>
  </div>`;
}

function cycleStatus(id, newStatus) {
  updateLessonStatus(id, newStatus);
}

// ═══ STUDENTS ═══
function renderStudents() {
  let html = '';

  if (students.length === 0) {
    html += `<div class="empty-state">
      <div class="es-icon">👥</div>
      <div class="es-text">Додайте першого учня</div>
    </div>`;
  } else {
    students.forEach(s => {
      const messengerBtn = s.messengerType ?
        `<a href="${getMessengerLink(s.messengerType, s.messengerContact)}" target="_blank" class="messenger-btn ${getMessengerClass(s.messengerType)}" onclick="event.stopPropagation()">${getMessengerIcon(s.messengerType)}</a>` : '';

      const paymentIcons = { cash: '💵', card: '💳', paypal: '🅿️' };
      const paymentIcon = paymentIcons[s.defaultPaymentMethod] || '💵';

      html += `<div class="card student-card" onclick="openStudentForm('${s.id}')">
        <div class="student-avatar">${s.emoji || '🎵'}</div>
        <div class="student-info">
          <div class="student-name">${s.name}</div>
          <div class="student-details">${s.defaultDuration || 45} хв · ${s.defaultPrice || 0}€ · ${paymentIcon}</div>
        </div>
        ${messengerBtn}
      </div>`;
    });
  }

  document.getElementById('viewStudents').innerHTML = html;
}

// ═══ SETTINGS ═══
function renderSettings() {
  const calendarStatus = gAccessToken ? '✅ підключено' : '⚠️ увійдіть знову для синхронізації';

  let html = `<div class="card" style="margin-top:12px">
    <div class="setting-row">
      <span class="setting-label">Нагадування до уроку</span>
      <div class="setting-value">
        <select class="setting-select" onchange="updateReminder(this.value)">
          ${[10,15,30,45,60,120].map(m => `<option value="${m}" ${settings.reminderMinutes == m ? 'selected' : ''}>${m} хв</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Google Календар</span>
      <span style="font-size:0.85rem;color:var(--text-secondary)">${calendarStatus}</span>
    </div>
  </div>
  <button class="logout-btn" onclick="auth.signOut()">
    Вийти з акаунту
  </button>
  <div style="text-align:center;margin-top:24px;color:var(--text-light);font-size:0.8rem">
    <span style="font-family:'Playfair Display',serif;font-size:1rem">Melodia</span> ♪<br>
    створено з любов'ю ♡
  </div>`;

  document.getElementById('viewSettings').innerHTML = html;
}

function updateReminder(val) {
  saveSettings({ reminderMinutes: parseInt(val) });
}

// ═══════════════════════════════════════
// MODALS
// ═══════════════════════════════════════
function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

const EMOJIS = ['🎵','🎶','🎹','🎻','🎸','🎤','🎼','🎺','🥁','🎷','🪈','🪗','👩','👦','👧','👨','👩‍🎤','👨‍🎤','🧑','🌸','🌺','⭐','🦋','🌈','💜','🩵','🍀','🐱'];

// ═══ STUDENT FORM ═══
function openStudentForm(id) {
  const s = id ? students.find(x => x.id === id) : null;
  const title = s ? 'Редагувати учня' : 'Новий учень';
  const selEmoji = s?.emoji || '🎵';
  const selMessenger = s?.messengerType || '';

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">${title}</div>

      <div class="form-group">
        <label class="form-label">Іконка</label>
        <div class="emoji-grid" id="emojiGrid">
          ${EMOJIS.map(e => `<button class="emoji-option ${e===selEmoji?'selected':''}" onclick="selectEmoji(this, '${e}')">${e}</button>`).join('')}
        </div>
        <input type="hidden" id="fStudentEmoji" value="${selEmoji}">
      </div>

      <div class="form-group">
        <label class="form-label">Ім'я</label>
        <input type="text" class="form-input" id="fStudentName" value="${s?.name||''}" placeholder="Ім'я учня">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Тривалість (хв)</label>
          <input type="number" class="form-input" id="fStudentDuration" value="${s?.defaultDuration||45}" placeholder="45">
        </div>
        <div class="form-group">
          <label class="form-label">Ціна (€)</label>
          <input type="number" class="form-input" id="fStudentPrice" value="${s?.defaultPrice||''}" placeholder="40">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Месенджер</label>
        <div class="messenger-grid">
          <button class="messenger-option ${selMessenger==='whatsapp'?'selected':''}" onclick="selectMessenger(this,'whatsapp')"><span class="m-icon">💬</span><span class="m-label">WhatsApp</span></button>
          <button class="messenger-option ${selMessenger==='telegram'?'selected':''}" onclick="selectMessenger(this,'telegram')"><span class="m-icon">✈️</span><span class="m-label">Telegram</span></button>
          <button class="messenger-option ${selMessenger==='facebook'?'selected':''}" onclick="selectMessenger(this,'facebook')"><span class="m-icon">💭</span><span class="m-label">Messenger</span></button>
          <button class="messenger-option ${selMessenger==='imessage'?'selected':''}" onclick="selectMessenger(this,'imessage')"><span class="m-icon">🍏</span><span class="m-label">iMessage</span></button>
        </div>
        <input type="hidden" id="fStudentMessengerType" value="${selMessenger}">
      </div>

      <div class="form-group" id="messengerContactGroup" style="display:${selMessenger?'block':'none'}">
        <label class="form-label">Контакт (номер або username)</label>
        <input type="text" class="form-input" id="fStudentContact" value="${s?.messengerContact||''}" placeholder="+49... або @username">
      </div>

      <div class="form-group">
        <label class="form-label">Спосіб оплати за замовчуванням</label>
        <div class="payment-grid">
          <button class="payment-option ${(s?.defaultPaymentMethod||'cash')==='cash'?'selected':''}" onclick="selectStudentPaymentMethod(this,'cash')">
            <span class="p-icon">💵</span>
            <span class="p-label">Готівка</span>
          </button>
          <button class="payment-option ${(s?.defaultPaymentMethod||'')==='card'?'selected':''}" onclick="selectStudentPaymentMethod(this,'card')">
            <span class="p-icon">💳</span>
            <span class="p-label">Картка</span>
          </button>
          <button class="payment-option ${(s?.defaultPaymentMethod||'')==='paypal'?'selected':''}" onclick="selectStudentPaymentMethod(this,'paypal')">
            <span class="p-icon">🅿️</span>
            <span class="p-label">PayPal</span>
          </button>
        </div>
        <input type="hidden" id="fStudentPaymentMethod" value="${s?.defaultPaymentMethod||'cash'}">
      </div>

      <button class="form-btn btn-primary" onclick="submitStudent('${id||''}')">Зберегти</button>
      ${s ? `<button class="form-btn btn-danger" onclick="confirmDeleteStudent('${id}')">Видалити учня</button>` : ''}
      <button class="form-btn btn-secondary" onclick="closeModal()">Скасувати</button>
    </div>
  </div>`;

  document.getElementById('modalContainer').innerHTML = html;
}

function selectEmoji(btn, emoji) {
  document.querySelectorAll('#emojiGrid .emoji-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('fStudentEmoji').value = emoji;
}

function selectMessenger(btn, type) {
  document.querySelectorAll('.messenger-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('fStudentMessengerType').value = type;
  document.getElementById('messengerContactGroup').style.display = 'block';
}

function selectStudentPaymentMethod(btn, method) {
  btn.closest('.payment-grid').querySelectorAll('.payment-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('fStudentPaymentMethod').value = method;
}

function selectPaymentMethod(btn, method) {
  btn.closest('.payment-grid').querySelectorAll('.payment-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('fLessonPaymentMethod').value = method;
}

function submitStudent(id) {
  const name = document.getElementById('fStudentName').value.trim();
  if (!name) { alert('Введіть ім\'я'); return; }

  const data = {
    name,
    emoji: document.getElementById('fStudentEmoji').value,
    defaultDuration: parseInt(document.getElementById('fStudentDuration').value) || 45,
    defaultPrice: parseFloat(document.getElementById('fStudentPrice').value) || 0,
    messengerType: document.getElementById('fStudentMessengerType').value || null,
    messengerContact: document.getElementById('fStudentContact').value.trim() || null,
    defaultPaymentMethod: document.getElementById('fStudentPaymentMethod').value || 'cash'
  };

  saveStudent(data, id || null);
  closeModal();
}

function confirmDeleteStudent(id) {
  const s = students.find(x => x.id === id);
  document.getElementById('modalContainer').innerHTML += `<div class="confirm-dialog" onclick="if(event.target===this){this.remove()}">
    <div class="confirm-box">
      <p>Видалити учня <strong>${s?.name}</strong>?</p>
      <div class="confirm-btns">
        <button style="background:var(--bg);color:var(--text-secondary)" onclick="this.closest('.confirm-dialog').remove()">Скасувати</button>
        <button style="background:var(--accent-rose);color:white" onclick="deleteStudent('${id}');closeModal()">Видалити</button>
      </div>
    </div>
  </div>`;
}

// ═══ ADD LESSON ═══
function openAddLesson() {
  const date = currentView === 'lessons' ? selectedDate : todayStr();
  showLessonStudentPicker(date);
}

function showLessonStudentPicker(date) {
  // Find suggested students (same day of week, last week)
  const d = parseDate(date);
  const lastWeekSameDay = addDays(date, -7);
  const suggested = lessons.filter(l => l.date === lastWeekSameDay).map(l => students.find(s => s.id === l.studentId)).filter(Boolean);
  const suggestedIds = new Set(suggested.map(s => s.id));
  const others = students.filter(s => !suggestedIds.has(s.id));

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Новий урок · ${fmtDateUkr(date)}</div>`;

  if (suggested.length > 0) {
    html += `<div class="form-label" style="margin-bottom:8px">Минулого тижня (${DAY_NAMES[d.getDay()]})</div>
    <div class="suggested-list">
      ${suggested.map(s => `<button class="suggested-chip" onclick="openLessonForm('${date}','${s.id}')">
        <span class="sc-emoji">${s.emoji||'🎵'}</span>
        <span class="sc-name">${s.name}</span>
      </button>`).join('')}
    </div>`;
  }

  if (students.length > 0) {
    html += `<div class="form-label" style="margin:16px 0 8px">Усі учні</div>`;
    const allStudents = suggested.length > 0 ? [...suggested, ...others] : students;
    allStudents.forEach(s => {
      html += `<div class="student-select-item" onclick="openLessonForm('${date}','${s.id}')">
        <span class="ss-emoji">${s.emoji||'🎵'}</span>
        <span class="ss-name">${s.name}</span>
        <span class="ss-details">${s.defaultDuration||45}хв · ${s.defaultPrice||0}€</span>
      </div>`;
    });
  } else {
    html += `<div class="empty-state" style="padding:2rem 0">
      <div class="es-text">Спочатку додайте учнів</div>
    </div>
    <button class="form-btn btn-primary" onclick="closeModal();switchView('students');openStudentForm()">Додати учня</button>`;
  }

  html += `<button class="form-btn btn-secondary" onclick="closeModal()">Скасувати</button>
    </div></div>`;

  document.getElementById('modalContainer').innerHTML = html;
}

function openLessonForm(date, studentId, lessonId) {
  const student = students.find(s => s.id === studentId);
  const lesson = lessonId ? lessons.find(l => l.id === lessonId) : null;
  const time = lesson?.time || '';
  const duration = lesson?.duration || student?.defaultDuration || 45;
  const price = lesson?.price ?? student?.defaultPrice ?? 0;

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">${lesson ? 'Редагувати урок' : 'Новий урок'}</div>

      <div class="card student-card" style="margin-bottom:16px;cursor:default">
        <div class="student-avatar">${student?.emoji||'🎵'}</div>
        <div class="student-info">
          <div class="student-name">${student?.name||'Учень'}</div>
          <div class="student-details">${fmtDateFull(date)}</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Дата</label>
        <input type="date" class="form-input" id="fLessonDate" value="${date}">
      </div>

      <div class="form-group">
        <label class="form-label">Час</label>
        <input type="time" class="form-input" id="fLessonTime" value="${time}">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Тривалість (хв)</label>
          <input type="number" class="form-input" id="fLessonDuration" value="${duration}">
        </div>
        <div class="form-group">
          <label class="form-label">Ціна (€)</label>
          <input type="number" class="form-input" id="fLessonPrice" value="${price}" step="0.5">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Спосіб оплати</label>
        <div class="payment-grid">
          <button class="payment-option ${(lesson?.paymentMethod||student?.defaultPaymentMethod||'cash')==='cash'?'selected':''}" onclick="selectPaymentMethod(this,'cash')">
            <span class="p-icon">💵</span>
            <span class="p-label">Готівка</span>
          </button>
          <button class="payment-option ${(lesson?.paymentMethod||student?.defaultPaymentMethod||'')==='card'?'selected':''}" onclick="selectPaymentMethod(this,'card')">
            <span class="p-icon">💳</span>
            <span class="p-label">Картка</span>
          </button>
          <button class="payment-option ${(lesson?.paymentMethod||student?.defaultPaymentMethod||'')==='paypal'?'selected':''}" onclick="selectPaymentMethod(this,'paypal')">
            <span class="p-icon">🅿️</span>
            <span class="p-label">PayPal</span>
          </button>
        </div>
        <input type="hidden" id="fLessonPaymentMethod" value="${lesson?.paymentMethod||student?.defaultPaymentMethod||'cash'}">
      </div>

      <button class="form-btn btn-primary" onclick="submitLesson('${studentId}','${lessonId||''}')">
        ${lesson ? 'Зберегти зміни' : 'Додати урок'}
      </button>
      ${lesson ? `<button class="form-btn btn-danger" onclick="confirmDeleteLesson('${lessonId}')">Видалити урок</button>` : ''}
      <button class="form-btn btn-secondary" onclick="closeModal()">Скасувати</button>
    </div>
  </div>`;

  document.getElementById('modalContainer').innerHTML = html;
}

function submitLesson(studentId, lessonId) {
  const student = students.find(s => s.id === studentId);
  const date = document.getElementById('fLessonDate').value;
  const time = document.getElementById('fLessonTime').value;
  if (!date) { alert('Оберіть дату'); return; }

  const data = {
    studentId,
    studentName: student?.name || 'Учень',
    studentEmoji: student?.emoji || '🎵',
    date,
    time: time || '00:00',
    duration: parseInt(document.getElementById('fLessonDuration').value) || 45,
    price: parseFloat(document.getElementById('fLessonPrice').value) || 0,
    paymentMethod: document.getElementById('fLessonPaymentMethod').value || 'cash',
    status: lessonId ? (lessons.find(l=>l.id===lessonId)?.status || 'planned') : 'planned'
  };

  saveLesson(data, lessonId || null).then(() => {
    if (lessonId) {
      const lesson = lessons.find(l => l.id === lessonId);
      if (lesson) updateCalendarEvent(lesson);
    }
  });
  closeModal();
}

function openEditLesson(id) {
  const l = lessons.find(x => x.id === id);
  if (!l) return;
  openLessonForm(l.date, l.studentId, l.id);
}

function confirmDeleteLesson(id) {
  document.getElementById('modalContainer').innerHTML += `<div class="confirm-dialog" onclick="if(event.target===this){this.remove()}">
    <div class="confirm-box">
      <p>Видалити цей урок?</p>
      <div class="confirm-btns">
        <button style="background:var(--bg);color:var(--text-secondary)" onclick="this.closest('.confirm-dialog').remove()">Скасувати</button>
        <button style="background:var(--accent-rose);color:white" onclick="deleteLesson('${id}');closeModal()">Видалити</button>
      </div>
    </div>
  </div>`;
}

// ═══ UNPAID VIEW ═══
function showUnpaid() {
  const unpaid = lessons.filter(l => l.status === 'completed').sort((a,b) => a.date.localeCompare(b.date));
  const total = unpaid.reduce((s,l) => s + (l.price||0), 0);

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Несплачені уроки</div>
      <div style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:16px">Загалом: <strong style="color:var(--text)">${total}€</strong></div>`;

  unpaid.forEach(l => {
    html += `<div class="card lesson-card" style="cursor:default">
      <div class="lesson-emoji status-completed">${l.studentEmoji||'🎵'}</div>
      <div class="lesson-info">
        <div class="lesson-name">${l.studentName}</div>
        <div class="lesson-meta">
          <span>${fmtDateUkr(l.date)}</span>
          <span>${l.time||''}</span>
        </div>
      </div>
      <div class="lesson-right">
        <div class="lesson-price">${l.price||0}€</div>
        <button class="status-badge badge-completed" onclick="event.stopPropagation();cycleStatus('${l.id}','paid');closeModal()">
          Сплачено ✓
        </button>
      </div>
    </div>`;
  });

  html += `<button class="form-btn btn-secondary" onclick="closeModal()">Закрити</button>
    </div></div>`;

  document.getElementById('modalContainer').innerHTML = html;
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  selectedDate = todayStr();
  selectedWeekStart = getWeekStart(new Date());
});
</script>
