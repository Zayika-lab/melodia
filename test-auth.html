<!DOCTYPE html>
<html>
<head>
<title>Швидкий тест авторизації</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.log { background: #f0f0f0; padding: 10px; margin: 10px 0; white-space: pre-wrap; font-family: monospace; }
</style>
</head>
<body>

<h1>🔧 Швидкий тест Google Auth</h1>
<button onclick="testAuth()" style="padding: 10px 20px; font-size: 16px;">🔐 Тест авторизації</button>
<div id="log" class="log">Готовий до тестування...</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
function log(msg) {
  document.getElementById('log').textContent += '\n' + msg;
  console.log(msg);
}

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyATvn_FjFyLlp2hPg7nym6zRsZAHxi481E",
  authDomain: "melodia-6b440.firebaseapp.com",
  projectId: "melodia-6b440"
};

log('🔥 Ініціалізація Firebase...');

try {
  firebase.initializeApp(firebaseConfig);
  log('✅ Firebase ініціалізовано');
} catch(e) {
  log('❌ Помилка Firebase: ' + e.message);
}

function testAuth() {
  log('🚀 Початок тесту авторизації...');

  try {
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    log('📋 Auth провайдер створено');

    auth.signInWithPopup(provider)
      .then(result => {
        log('✅ УСПІХ! Користувач: ' + result.user.email);
      })
      .catch(error => {
        log('❌ ПОМИЛКА: ' + error.code + ' - ' + error.message);
      });

  } catch(e) {
    log('❌ Критична помилка: ' + e.message);
  }
}
</script>

</body>
</html>
