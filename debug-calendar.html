<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Calendar API Debug</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
.debug-panel { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
.log { background: #f8f8f8; padding: 10px; border-radius: 4px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto; font-size: 12px; }
.btn { padding: 12px 24px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
.btn:hover { background: #3367d6; }
.status { padding: 8px; border-radius: 4px; margin: 5px 0; }
.status.ok { background: #d4edda; color: #155724; }
.status.error { background: #f8d7da; color: #721c24; }
.status.warning { background: #fff3cd; color: #856404; }
.test-result { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 4px; }
</style>
</head>
<body>

<h1>🔧 Google Calendar API Debug</h1>

<div class="debug-panel">
  <h3>🔐 Авторизація</h3>
  <button class="btn" onclick="login()">Увійти в Google</button>
  <button class="btn" onclick="logout()">Вийти</button>
  <div id="authStatus" class="status"></div>
</div>

<div class="debug-panel">
  <h3>📊 Тести Calendar API</h3>
  <button class="btn" onclick="testCalendarRead()">1️⃣ Тест читання календарів</button>
  <button class="btn" onclick="testEventsRead()">2️⃣ Тест читання подій</button>
  <button class="btn" onclick="testEventCreate()">3️⃣ Тест створення події</button>
  <button class="btn" onclick="testEventUpdate()">4️⃣ Тест оновлення події</button>
  <button class="btn" onclick="testEventDelete()">5️⃣ Тест видалення події</button>
  <button class="btn" onclick="runAllTests()">🚀 Запустити всі тести</button>
</div>

<div class="debug-panel">
  <h3>📝 Результати тестів</h3>
  <div id="testResults"></div>
</div>

<div class="debug-panel">
  <h3>📋 Детальні логи</h3>
  <button class="btn" onclick="clearLogs()" style="background: #dc3545;">Очистити логи</button>
  <div id="logs" class="log"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
let logs = [];
let gAccessToken = null;
let testEventId = null;

const firebaseConfig = {
  apiKey: "AIzaSyATvn_FjFyLlp2hPg7nym6zRsZAHxi481E",
  authDomain: "melodia-6b440.firebaseapp.com",
  projectId: "melodia-6b440",
  storageBucket: "melodia-6b440.firebasestorage.app",
  messagingSenderId: "417592321178",
  appId: "1:417592321178:web:06cd4cf1730e7efacaab23"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function log(message, type = 'info') {
  const timestamp = new Date().toLocaleTimeString();
  const logEntry = `[${timestamp}] ${message}`;
  logs.push(logEntry);

  console.log(logEntry);

  const logsDiv = document.getElementById('logs');
  logsDiv.textContent = logs.join('\n');
  logsDiv.scrollTop = logsDiv.scrollHeight;
}

function addTestResult(testName, status, message, details = '') {
  const resultsDiv = document.getElementById('testResults');
  const statusClass = status === 'success' ? 'ok' : (status === 'warning' ? 'warning' : 'error');
  const icon = status === 'success' ? '✅' : (status === 'warning' ? '⚠️' : '❌');

  resultsDiv.innerHTML += `
    <div class="test-result">
      <div class="status ${statusClass}">${icon} ${testName}: ${message}</div>
      ${details ? `<div style="font-size: 12px; color: #666; margin-top: 5px;">${details}</div>` : ''}
    </div>
  `;
}

function clearLogs() {
  logs = [];
  document.getElementById('logs').textContent = '';
  document.getElementById('testResults').innerHTML = '';
}

async function login() {
  log('🚀 Початок авторизації...');

  const gProvider = new firebase.auth.GoogleAuthProvider();
  gProvider.addScope('https://www.googleapis.com/auth/calendar');
  gProvider.addScope('https://www.googleapis.com/auth/calendar.events');
  gProvider.setCustomParameters({
    prompt: 'consent',
    access_type: 'offline'
  });

  try {
    const result = await auth.signInWithPopup(gProvider);

    if (result.credential) {
      gAccessToken = result.credential.accessToken;
      log(`✅ Авторизація успішна! Токен: ${gAccessToken.substring(0, 50)}...`);

      document.getElementById('authStatus').innerHTML =
        '<div class="status ok">✅ Авторизовано: ' + result.user.email + '</div>';
    } else {
      log('⚠️ Авторизація без токену');
      document.getElementById('authStatus').innerHTML =
        '<div class="status warning">⚠️ Авторизовано без токену</div>';
    }
  } catch (error) {
    log(`❌ Помилка авторизації: ${error.message}`);
    document.getElementById('authStatus').innerHTML =
      '<div class="status error">❌ Помилка: ' + error.message + '</div>';
  }
}

function logout() {
  auth.signOut();
  gAccessToken = null;
  document.getElementById('authStatus').innerHTML =
    '<div class="status">Не авторизовано</div>';
  log('👋 Вихід виконано');
}

async function testCalendarRead() {
  log('📅 Тест 1: Читання списку календарів...');

  if (!gAccessToken) {
    log('❌ Немає токену авторизації');
    addTestResult('Читання календарів', 'error', 'Немає токену');
    return;
  }

  try {
    const response = await fetch('https://www.googleapis.com/calendar/v3/calendar/primary', {
      headers: { Authorization: `Bearer ${gAccessToken}` }
    });

    log(`📡 Відповідь: ${response.status} ${response.statusText}`);

    if (response.ok) {
      const data = await response.json();
      log(`✅ Основний календар: "${data.summary}" (${data.id})`);
      addTestResult('Читання календарів', 'success', `Основний календар: ${data.summary}`,
        `ID: ${data.id}\nЧасовий пояс: ${data.timeZone}`);
    } else {
      const errorText = await response.text();
      log(`❌ Помилка читання календаря: ${errorText}`);
      addTestResult('Читання календарів', 'error', `HTTP ${response.status}`, errorText);
    }
  } catch (error) {
    log(`❌ Критична помилка: ${error.message}`);
    addTestResult('Читання календарів', 'error', 'Мережева помилка', error.message);
  }
}

async function testEventsRead() {
  log('📋 Тест 2: Читання подій...');

  if (!gAccessToken) {
    log('❌ Немає токену авторизації');
    addTestResult('Читання подій', 'error', 'Немає токену');
    return;
  }

  try {
    const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?maxResults=5', {
      headers: { Authorization: `Bearer ${gAccessToken}` }
    });

    log(`📡 Відповідь: ${response.status} ${response.statusText}`);

    if (response.ok) {
      const data = await response.json();
      log(`✅ Знайдено подій: ${data.items ? data.items.length : 0}`);

      if (data.items && data.items.length > 0) {
        data.items.slice(0, 3).forEach((event, i) => {
          log(`  ${i+1}. "${event.summary || 'Без назви'}" (${event.id})`);
        });
        addTestResult('Читання подій', 'success', `Знайдено ${data.items.length} подій`);
      } else {
        addTestResult('Читання подій', 'success', 'Календар порожній');
      }
    } else {
      const errorText = await response.text();
      log(`❌ Помилка читання подій: ${errorText}`);
      addTestResult('Читання подій', 'error', `HTTP ${response.status}`, errorText);
    }
  } catch (error) {
    log(`❌ Критична помилка: ${error.message}`);
    addTestResult('Читання подій', 'error', 'Мережева помилка', error.message);
  }
}

async function testEventCreate() {
  log('➕ Тест 3: Створення тестової події...');

  if (!gAccessToken) {
    log('❌ Немає токену авторизації');
    addTestResult('Створення події', 'error', 'Немає токену');
    return;
  }

  const now = new Date();
  const startTime = new Date(now.getTime() + 60 * 60 * 1000); // +1 година
  const endTime = new Date(startTime.getTime() + 45 * 60 * 1000); // +45 хв

  const testEvent = {
    summary: '🧪 Тест Melodia Calendar API',
    description: 'Тестова подія для перевірки інтеграції\n\nСтворено автоматично системою діагностики',
    start: {
      dateTime: startTime.toISOString(),
      timeZone: 'Europe/Berlin'
    },
    end: {
      dateTime: endTime.toISOString(),
      timeZone: 'Europe/Berlin'
    },
    reminders: {
      useDefault: false,
      overrides: [{ method: 'popup', minutes: 5 }]
    }
  };

  log(`📅 Створюємо подію: "${testEvent.summary}"`);
  log(`⏰ Час: ${startTime.toLocaleString()} - ${endTime.toLocaleString()}`);
  log(`📄 Дані події: ${JSON.stringify(testEvent, null, 2)}`);

  try {
    const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${gAccessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(testEvent)
    });

    log(`📡 Відповідь: ${response.status} ${response.statusText}`);

    if (response.ok) {
      const data = await response.json();
      testEventId = data.id;
      log(`✅ Подію створено! ID: ${testEventId}`);
      log(`🔗 Посилання: ${data.htmlLink}`);
      addTestResult('Створення події', 'success', 'Подію створено успішно',
        `ID: ${testEventId}\nПосилання: ${data.htmlLink}`);
    } else {
      const errorText = await response.text();
      log(`❌ Помилка створення події: ${errorText}`);

      let errorData;
      try {
        errorData = JSON.parse(errorText);
      } catch(e) {
        errorData = { message: errorText };
      }

      addTestResult('Створення події', 'error', `HTTP ${response.status}`,
        JSON.stringify(errorData, null, 2));
    }
  } catch (error) {
    log(`❌ Критична помилка: ${error.message}`);
    addTestResult('Створення події', 'error', 'Мережева помилка', error.message);
  }
}

async function testEventUpdate() {
  log('✏️ Тест 4: Оновлення події...');

  if (!gAccessToken) {
    log('❌ Немає токену авторизації');
    addTestResult('Оновлення події', 'error', 'Немає токену');
    return;
  }

  if (!testEventId) {
    log('❌ Немає ID тестової події');
    addTestResult('Оновлення події', 'error', 'Немає ID події для оновлення');
    return;
  }

  const updatedEvent = {
    summary: '🧪 Тест Melodia Calendar API (ОНОВЛЕНО)',
    description: 'Тестова подія для перевірки інтеграції\n\n✅ Подія була оновлена системою діагностики'
  };

  log(`📝 Оновлюємо подію ${testEventId}...`);

  try {
    const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${testEventId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${gAccessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(updatedEvent)
    });

    log(`📡 Відповідь: ${response.status} ${response.statusText}`);

    if (response.ok) {
      const data = await response.json();
      log(`✅ Подію оновлено! Нова назва: "${data.summary}"`);
      addTestResult('Оновлення події', 'success', 'Подію оновлено');
    } else {
      const errorText = await response.text();
      log(`❌ Помилка оновлення події: ${errorText}`);
      addTestResult('Оновлення події', 'error', `HTTP ${response.status}`, errorText);
    }
  } catch (error) {
    log(`❌ Критична помилка: ${error.message}`);
    addTestResult('Оновлення події', 'error', 'Мережева помилка', error.message);
  }
}

async function testEventDelete() {
  log('🗑️ Тест 5: Видалення події...');

  if (!gAccessToken) {
    log('❌ Немає токену авторизації');
    addTestResult('Видалення події', 'error', 'Немає токену');
    return;
  }

  if (!testEventId) {
    log('❌ Немає ID тестової події');
    addTestResult('Видалення події', 'error', 'Немає ID події для видалення');
    return;
  }

  log(`🗑️ Видаляємо подію ${testEventId}...`);

  try {
    const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${testEventId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${gAccessToken}` }
    });

    log(`📡 Відповідь: ${response.status} ${response.statusText}`);

    if (response.ok || response.status === 410) {
      log(`✅ Подію видалено успішно`);
      addTestResult('Видалення події', 'success', 'Подію видалено');
      testEventId = null;
    } else {
      const errorText = await response.text();
      log(`❌ Помилка видалення події: ${errorText}`);
      addTestResult('Видалення події', 'error', `HTTP ${response.status}`, errorText);
    }
  } catch (error) {
    log(`❌ Критична помилка: ${error.message}`);
    addTestResult('Видалення події', 'error', 'Мережева помилка', error.message);
  }
}

async function runAllTests() {
  log('🚀 Запуск повного набору тестів...');
  clearLogs();

  await testCalendarRead();
  await new Promise(r => setTimeout(r, 1000));

  await testEventsRead();
  await new Promise(r => setTimeout(r, 1000));

  await testEventCreate();
  await new Promise(r => setTimeout(r, 2000));

  if (testEventId) {
    await testEventUpdate();
    await new Promise(r => setTimeout(r, 1000));

    await testEventDelete();
  }

  log('✅ Всі тести завершено!');
}

// Автоматична перевірка стану авторизації
auth.onAuthStateChanged(user => {
  if (user) {
    log(`👤 Користувач: ${user.email}`);
    document.getElementById('authStatus').innerHTML =
      '<div class="status ok">✅ Авторизовано: ' + user.email + '</div>';
  } else {
    log('👤 Користувач не авторизований');
    document.getElementById('authStatus').innerHTML =
      '<div class="status">❌ Не авторизовано</div>';
  }
});

window.onload = function() {
  log('🔧 Calendar API Debug Tool готовий');
  log('📋 Інструкції:');
  log('  1. Натисніть "Увійти в Google"');
  log('  2. Дозвольте всі дозволи');
  log('  3. Запустіть тести');
};

</script>

</body>
</html>
