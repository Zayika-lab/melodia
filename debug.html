<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug - Melodia Auth Test</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
.debug-panel { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
.log { background: #f8f8f8; padding: 10px; border-radius: 4px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
.btn { padding: 12px 24px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
.btn:hover { background: #3367d6; }
.status { padding: 8px; border-radius: 4px; margin: 5px 0; }
.status.ok { background: #d4edda; color: #155724; }
.status.error { background: #f8d7da; color: #721c24; }
.status.warning { background: #fff3cd; color: #856404; }
</style>
</head>
<body>

<h1>🔧 Melodia Auth Debug</h1>

<div class="debug-panel">
  <h3>🔍 Системна діагностика</h3>
  <div id="systemStatus"></div>

  <h3>📊 Firebase статус</h3>
  <div id="firebaseStatus"></div>

  <h3>🚀 Google Auth тест</h3>
  <button class="btn" onclick="testGoogleAuth()">🔐 Тест Google Auth</button>
  <button class="btn" onclick="testCalendarAccess()">📅 Тест Calendar API</button>
  <button class="btn" onclick="clearLogs()">🗑️ Очистити логи</button>

  <h3>📝 Логи</h3>
  <div id="logs" class="log"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
let logs = [];
let gAccessToken = null;

function log(message, type = 'info') {
  const timestamp = new Date().toLocaleTimeString();
  const logEntry = `[${timestamp}] ${message}`;
  logs.push(logEntry);

  console.log(logEntry);

  const logsDiv = document.getElementById('logs');
  logsDiv.textContent = logs.join('\n');
  logsDiv.scrollTop = logsDiv.scrollHeight;
}

function setStatus(elementId, message, type = 'info') {
  const element = document.getElementById(elementId);
  element.innerHTML = `<div class="status ${type}">${message}</div>`;
}

function clearLogs() {
  logs = [];
  document.getElementById('logs').textContent = '';
}

// Системна діагностика
function checkSystem() {
  log('🔍 Початок системної діагностики...');

  // Перевірка браузера
  const isChrome = /Chrome/.test(navigator.userAgent);
  const isFirefox = /Firefox/.test(navigator.userAgent);
  const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);

  log(`📱 Браузер: ${navigator.userAgent}`);
  log(`🌐 URL: ${window.location.href}`);
  log(`🔒 HTTPS: ${window.location.protocol === 'https:'}`);

  let systemStatus = `
    <div class="status ${window.location.protocol === 'https:' ? 'ok' : 'warning'}">
      🔒 Протокол: ${window.location.protocol}
    </div>
    <div class="status ${isChrome || isFirefox ? 'ok' : 'warning'}">
      📱 Браузер: ${isChrome ? 'Chrome ✅' : isFirefox ? 'Firefox ✅' : isSafari ? 'Safari ⚠️' : 'Інший ⚠️'}
    </div>
  `;

  setStatus('systemStatus', systemStatus);
}

// Firebase конфігурація
const firebaseConfig = {
  apiKey: "AIzaSyATvn_FjFyLlp2hPg7nym6zRsZAHxi481E",
  authDomain: "melodia-6b440.firebaseapp.com",
  projectId: "melodia-6b440",
  storageBucket: "melodia-6b440.firebasestorage.app",
  messagingSenderId: "417592321178",
  appId: "1:417592321178:web:06cd4cf1730e7efacaab23"
};

// Ініціалізація Firebase
try {
  log('🔥 Ініціалізація Firebase...');
  firebase.initializeApp(firebaseConfig);
  log('✅ Firebase ініціалізовано успішно');

  const db = firebase.firestore();
  const auth = firebase.auth();
  const gProvider = new firebase.auth.GoogleAuthProvider();

  // Додаємо scope для Calendar
  gProvider.addScope('https://www.googleapis.com/auth/calendar.events');
  gProvider.setCustomParameters({
    prompt: 'select_account'
  });

  log('✅ Google Auth Provider налаштовано');
  setStatus('firebaseStatus', '<div class="status ok">✅ Firebase готовий до роботи</div>');

} catch (error) {
  log(`❌ Помилка ініціалізації Firebase: ${error.message}`, 'error');
  setStatus('firebaseStatus', `<div class="status error">❌ Помилка: ${error.message}</div>`);
}

// Тест Google авторизації
async function testGoogleAuth() {
  log('🚀 Початок тесту Google Auth...');

  try {
    // Перевірка доступності Firebase Auth
    if (typeof firebase === 'undefined') {
      throw new Error('Firebase SDK не завантажено');
    }

    if (!firebase.auth) {
      throw new Error('Firebase Auth недоступний');
    }

    log('📋 Firebase Auth модулі перевірено');

    // Перевірка popup блокування
    log('🔓 Спроба відкрити popup для авторизації...');

    const result = await firebase.auth().signInWithPopup(gProvider);

    log(`✅ Авторизація успішна! Користувач: ${result.user.email}`);

    // Отримання токену для Calendar
    if (result.credential) {
      gAccessToken = result.credential.accessToken;
      log('✅ Google Calendar токен отримано');
    } else {
      log('⚠️ Google Calendar токен НЕ отримано');
    }

    log(`👤 Користувач: ${result.user.displayName} (${result.user.email})`);
    log(`🔑 UID: ${result.user.uid}`);

  } catch (error) {
    log(`❌ Помилка авторизації: ${error.code} - ${error.message}`, 'error');

    // Детальна діагностика помилок
    if (error.code === 'auth/popup-closed-by-user') {
      log('💡 Рішення: Не закривайте вікно авторизації до завершення', 'warning');
    } else if (error.code === 'auth/popup-blocked') {
      log('💡 Рішення: Дозвольте спливаючі вікна для цього сайту', 'warning');
    } else if (error.code === 'auth/cancelled-popup-request') {
      log('💡 Рішення: Почекайте завершення попереднього запиту', 'warning');
    } else if (error.code === 'auth/network-request-failed') {
      log('💡 Рішення: Перевірте інтернет-з\'єднання', 'warning');
    }
  }
}

// Тест Calendar API
async function testCalendarAccess() {
  log('📅 Тестування доступу до Google Calendar...');

  if (!gAccessToken) {
    log('❌ Немає токену доступу. Спочатку увійдіть через Google', 'error');
    return;
  }

  try {
    const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary', {
      headers: { Authorization: `Bearer ${gAccessToken}` }
    });

    if (response.ok) {
      const calendar = await response.json();
      log(`✅ Calendar API працює! Календар: "${calendar.summary}"`);

      // Тест створення тестової події
      const testEvent = {
        summary: '🧪 Тестова подія Melodia',
        description: 'Автоматичний тест Google Calendar API',
        start: {
          dateTime: new Date(Date.now() + 60000).toISOString().slice(0,19),
          timeZone: 'Europe/Berlin'
        },
        end: {
          dateTime: new Date(Date.now() + 120000).toISOString().slice(0,19),
          timeZone: 'Europe/Berlin'
        }
      };

      log('📝 Створення тестової події...');
      const createResponse = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${gAccessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(testEvent)
      });

      if (createResponse.ok) {
        const eventData = await createResponse.json();
        log(`✅ Тестова подія створена! ID: ${eventData.id}`);

        // Видалення тестової події
        setTimeout(async () => {
          try {
            await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventData.id}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${gAccessToken}` }
            });
            log('🗑️ Тестова подія видалена');
          } catch (e) {
            log(`⚠️ Не вдалося видалити тестову подію: ${e.message}`);
          }
        }, 3000);

      } else {
        log(`❌ Не вдалося створити тестову подію: ${createResponse.status}`, 'error');
      }

    } else {
      log(`❌ Помилка доступу до Calendar: ${response.status} ${response.statusText}`, 'error');

      if (response.status === 401) {
        log('💡 Рішення: Токен прострочений, потрібна повторна авторизація', 'warning');
      }
    }

  } catch (error) {
    log(`❌ Помилка Calendar API: ${error.message}`, 'error');
  }
}

// Автодіагностика при завантаженні
window.onload = function() {
  checkSystem();

  // Слухач змін авторизації
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      log(`✅ Користувач автентифіковано: ${user.email}`);
    } else {
      log('❌ Користувач не автентифіковано');
    }
  });
};

</script>

</body>
</html>
